<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Resource Builder{% endblock %}</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eff6ff',
              100: '#dbeafe',
              500: '#3B82F6',
              600: '#2563eb',
              700: '#1d4ed8',
            }
          }
        }
      }
    }
  </script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>

  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* Loading overlay */
    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }
    #loading-overlay.active { display: flex; }

    /* Spinner */
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #dbeafe;
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Print styles */
    @media print {
      nav, .no-print { display: none !important; }
      body { background: white !important; }
    }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="h-full bg-gray-50 text-gray-900 antialiased">

  <!-- Loading overlay (shown during generation) -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p class="text-gray-600 font-medium">Generating your resource…</p>
    <p class="text-gray-400 text-sm">This may take a few seconds</p>
  </div>

  <!-- Navigation -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo -->
        <a href="/" class="flex items-center gap-2.5">
          <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
          </div>
          <span class="text-lg font-bold text-gray-900">Resource Builder</span>
        </a>

        <!-- Nav links -->
        <div class="flex items-center gap-1">
          <a href="/"
             class="px-4 py-2 rounded-lg text-sm font-medium transition-colors
                    {% if request.url.path == '/' %}bg-blue-50 text-blue-600{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %}">
            Generate
          </a>
          <a href="/library"
             class="px-4 py-2 rounded-lg text-sm font-medium transition-colors
                    {% if request.url.path == '/library' %}bg-blue-50 text-blue-600{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %}">
            Library
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-200 bg-white mt-auto no-print">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between text-xs text-gray-400">
      <span>Resource Builder – AI Educational Resource Engine</span>
      <span>Running locally at localhost:8000</span>
    </div>
  </footer>

  <script>
    // Show loading overlay when the generate form is submitted
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('generate-form');
      if (form) {
        form.addEventListener('htmx:beforeRequest', function () {
          document.getElementById('loading-overlay').classList.add('active');
        });
        form.addEventListener('htmx:afterRequest', function () {
          document.getElementById('loading-overlay').classList.remove('active');
        });
      }
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
